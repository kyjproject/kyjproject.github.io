<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — Student Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="portal-body">

<header class="portal-bar">
  <span id="welcome-text" class="portal-welcome"></span>
  <button id="logout-btn" class="portal-logout">Log out</button>
</header>

<main class="portal-frame-wrap">
  <iframe id="notion-frame" class="notion-frame" title="Notion portal"></iframe>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  requireLogin();
  var student = getCurrentStudent();
  renderPortal(student);

  document.getElementById('logout-btn').addEventListener('click', logout);
</script>
</body>
</html>
